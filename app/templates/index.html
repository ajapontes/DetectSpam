<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>DetectSpam</h1>
            <p class="subtitle">Analiza mensajes y detecta si podrían ser spam.</p>

            <textarea id="messageInput" placeholder="Escribe o pega aquí el mensaje..."></textarea>

            <div class="button-group">
                <button id="analyzeButton">Analizar mensaje</button>
                <button id="clearButton" type="button" class="secondary-button">Limpiar</button>
            </div>
            
            <div id="errorMessage" class="error-message hidden"></div>

            <section id="resultCard" class="result hidden">
                <h2 id="predictionText"></h2>
                <p id="confidenceText"></p>
                <p id="riskText"></p>
                <p id="messageText"></p>
                <p id="explanationText"></p>
            </section>
            <section class="metrics-section">
                <h2>Model Metrics</h2>
                <p class="metrics-subtitle">
                    Evaluation results generated from the latest model training process.
                </p>

                <div id="metricsGrid" class="metrics-grid">
                    <div class="metric-card">
                        <span class="metric-label">Accuracy</span>
                        <strong id="accuracyValue">--</strong>
                    </div>

                    <div class="metric-card">
                        <span class="metric-label">Precision</span>
                        <strong id="precisionValue">--</strong>
                    </div>

                    <div class="metric-card">
                        <span class="metric-label">Recall</span>
                        <strong id="recallValue">--</strong>
                    </div>

                    <div class="metric-card">
                        <span class="metric-label">F1 Score</span>
                        <strong id="f1Value">--</strong>
                    </div>
                </div>

                <div class="metrics-meta">
                    <p id="modelName"></p>
                    <p id="metricsGeneratedAt"></p>
                </div>
                <div class="confusion-matrix-section">
                    <h3>Confusion Matrix</h3>

                    <table class="confusion-matrix-table">
                        <thead>
                            <tr>
                                <th>Actual \ Predicted</th>
                                <th>HAM</th>
                                <th>SPAM</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <th>HAM</th>
                                <td id="trueNegatives">--</td>
                                <td id="falsePositives">--</td>
                            </tr>
                            <tr>
                                <th>SPAM</th>
                                <td id="falseNegatives">--</td>
                                <td id="truePositives">--</td>
                            </tr>
                        </tbody>
                    </table>

                    <div class="confusion-matrix-image-wrapper">
                        <img
                            src="/models/confusion_matrix.png"
                            alt="Confusion Matrix Heatmap"
                            class="confusion-matrix-image"
                        />
                    </div>

                    <p id="confusionMatrixInsight" class="confusion-insight"></p>
                </div>
            </section>
        </section>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
